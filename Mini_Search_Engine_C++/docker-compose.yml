services:
  cpp-engine:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./runtime_corpus:/app/../runtime_corpus
      - ./database:/app/../database

  ai-gateway:
    build: ./ai_middleware
    ports:
      - "3000:3000"
    depends_on:
      - cpp-engine
    environment:
      - ENGINE_URL=http://cpp-engine:8080

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"